name: Publish

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  publish:
    name: Publish
    permissions:
      contents: write # push the release tag
    environment: publish
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') && !contains(github.event.head_commit.message, '[publish skip]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # needed to fetch all history and tags

      - name: Install OTP and Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          version-file: mise.toml
          version-type: strict

      - name: Publish
        run: |
          mix deps.get
          mix compile
          .github/workflows/publish.sh
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
