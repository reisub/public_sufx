name: Outdated

on:
  schedule:
    - cron: '15 6 10 * *'
  workflow_dispatch:

permissions: {}

jobs:
  outdated:
    name: Check outdated
    runs-on: ubuntu-latest
    steps:
      # The default GITHUB_TOKEN doesn't trigger workflows on the PRs it
      # creates, so CI would never run on them. Use a GitHub App token instead.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Erlang & Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          version-file: mise.toml
          version-type: strict

      - name: Check outdated public suffix list
        run: |
          mix deps.get
          mix compile
          .github/workflows/outdated.sh
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
